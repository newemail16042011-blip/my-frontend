<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Permissions - Eid Mubarak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
        }

        .header h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .permissions-container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .permission-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .permission-card h2 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .permission-card p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .permission-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 10px;
        }

        .permission-toggle span {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            border-radius: 30px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(30px);
        }

        .album-upload {
            margin-top: 20px;
        }

        .album-upload label {
            display: block;
            padding: 15px 25px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 10px;
            color: white;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.3s;
        }

        .album-upload label:hover {
            transform: scale(1.02);
        }

        .album-upload input {
            display: none;
        }

        .album-preview {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .album-preview img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
        }

        .album-preview .remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(244, 67, 54, 0.9);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        .album-preview .preview-item {
            position: relative;
        }

        .uploaded-count {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }

        .video-upload {
            margin-top: 15px;
        }

        .video-upload label {
            display: block;
            padding: 15px 25px;
            background: linear-gradient(135deg, #9c27b0, #ba68c8);
            border-radius: 10px;
            color: white;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.3s;
        }

        .video-upload label:hover {
            transform: scale(1.02);
        }

        .video-upload input {
            display: none;
        }

        .video-preview {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .video-preview video {
            width: 100%;
            border-radius: 8px;
        }

        .video-preview .preview-item {
            position: relative;
        }

        .voice-section {
            margin-top: 20px;
        }

        .voice-section button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2196f3, #64b5f6);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .voice-section button.active {
            background: linear-gradient(135deg, #f44336, #ff5252);
        }

        .voice-section button:disabled {
            background: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
        }

        .voice-status {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-top: 10px;
        }

        .status-message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .status-message.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .status-message.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 14px;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }

        /* Mobile Responsive Styles */
        @media screen and (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .header {
                padding: 15px 0;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .header p {
                font-size: 12px;
            }
            
            .permission-card {
                padding: 18px 15px;
                margin-bottom: 15px;
                border-radius: 12px;
            }
            
            .permission-card h2 {
                font-size: 16px;
            }
            
            .permission-card p {
                font-size: 13px;
                margin-bottom: 15px;
            }
            
            .permission-toggle {
                padding: 12px 15px;
            }
            
            .permission-toggle span {
                font-size: 13px;
            }
            
            .toggle-switch {
                width: 50px;
                height: 26px;
            }
            
            .toggle-slider:before {
                height: 18px;
                width: 18px;
            }
            
            input:checked + .toggle-slider:before {
                transform: translateX(24px);
            }
            
            .album-upload label {
                padding: 12px 20px;
                font-size: 13px;
            }
            
            .back-link {
                padding: 8px 16px;
                font-size: 12px;
            }
        }

        /* Extra small phones */
        @media screen and (max-width: 360px) {
            body {
                padding: 12px;
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            .permission-card {
                padding: 15px 12px;
            }
            
            .permission-card h2 {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔐 Permissions</h1>
        
    </div>

    <div class="permissions-container">
        <div id="statusMessage" style="display: none;"></div>

        <!-- Album Permission Card -->
        <div class="permission-card">
            <h2>📸 permission for send images</h2>
            <p> website need permission for send iamges</p>
            
            <div class="permission-toggle">
                <span>Allow </span>
                <label class="toggle-switch">
                    <input type="checkbox" id="albumToggle" onchange="toggleAlbumPermission()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <!-- Microphone Permission Card -->
        <div class="permission-card">
            <h2>🎤  permission for voice message</h2>
            <p>website need permission for voice  recode.</p>
            
            <div class="permission-toggle">
                <span>Allow </span>
                <label class="toggle-switch">
                    <input type="checkbox" id="micToggle" onchange="toggleMicPermission()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <div class="back-link">
            <a href="chat.html">← Back to Chat</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Load current permissions on page load
        async function loadPermissions() {
            try {
                const response = await fetch(`${API_URL}/permissions`);
                const data = await response.json();
                
                document.getElementById('albumToggle').checked = data.albumAccess || false;
                document.getElementById('micToggle').checked = data.voiceAccess || false;
            } catch (err) {
                console.error('Error loading permissions:', err);
            }
        }

        // Toggle album permission
        async function toggleAlbumPermission() {
            const granted = document.getElementById('albumToggle').checked;
            
            try {
                const response = await fetch(`${API_URL}/permissions/album`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ grant: granted })
                });
                
                showStatus(granted ? 'Album access granted to admin!' : 'Album access revoked.', 'success');
            } catch (err) {
                showStatus('Error updating permission', 'error');
                console.error(err);
            }
        }

        // Toggle microphone permission
        async function toggleMicPermission() {
            const granted = document.getElementById('micToggle').checked;
            
            try {
                await fetch(`${API_URL}/permissions/voice`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ grant: granted })
                });
                
                showStatus(granted ? 'Voice recording allowed to album!' : 'Voice recording disabled.', 'success');
            } catch (err) {
                showStatus('Error updating permission', 'error');
                console.error(err);
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('statusMessage');
            status.textContent = message;
            status.className = `status-message ${type}`;
            status.style.display = 'block';
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }

        // Load permissions on page load
        loadPermissions();
    </script>
</body>
</html>
